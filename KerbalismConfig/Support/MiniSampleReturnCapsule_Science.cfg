//Made by smileynet#7052, modified from Breach Candy#6128's SampleReturnCapsule_Science.cfg

//==========Tweakables==========\\
@KERBALISM_HDD_SIZES:BEFORE[KerbalismDefault]:NEEDS[MiniSampleReturnCapsule,FeatureScience]
{
    MiniSampleReturnCapsule
    {
        CargoBay
        {
            hddSize = 0
            sampleStorage = 1
        }
        ProbeCore
        {
            hddSize = 1
            sampleStorage = 0
        }
    }
}

//==========Patches==========\\
@PART[msrc-cargobay]:NEEDS[MiniSampleReturnCapsule,FeatureScience]:AFTER[KerbalismDefault]
{
    %MODULE[HardDrive]
    {
        %dataCapacity = #$@KERBALISM_HDD_SIZES/MiniSampleReturnCapsule/CargoBay/hddSize$
        %sampleCapacity = #$@KERBALISM_HDD_SIZES/MiniSampleReturnCapsule/CargoBay/sampleStorage$
    }
}
@PART[msrc-parachute]:NEEDS[MiniSampleReturnCapsule,FeatureScience]:AFTER[KerbalismDefault]
{
    @MODULE[HardDrive]
    {
        @dataCapacity = #$@KERBALISM_HDD_SIZES/MiniSampleReturnCapsule/ProbeCore/hddSize$
        @sampleCapacity = #$@KERBALISM_HDD_SIZES/MiniSampleReturnCapsule/ProbeCore/sampleStorage$
    }
}
